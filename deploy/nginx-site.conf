# Положить на сервер: /etc/nginx/sites-available/pokemon-game.byred.fun
# После правки: sudo nginx -t && sudo systemctl reload nginx
# Путь к веб-сборке должен совпадать с тем, где лежит builds/web (здесь: /root/schoolgame/builds/web).

server {
    listen 80;
    listen [::]:80;
    server_name pokemon-game.byred.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pokemon-game.byred.fun;

    ssl_certificate     /etc/letsencrypt/live/pokemon-game.byred.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pokemon-game.byred.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/schoolgame/builds/web;

    location = / {
        return 302 /school21_game.html;
    }

    location /check {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(auth|tasks|code-errors|users|swagger)(/|$) {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
