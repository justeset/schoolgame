# Положить на сервер: /etc/nginx/sites-available/pokemon-game.byred.fun
# После правки: sudo nginx -t && sudo systemctl reload nginx
# Путь к веб-сборке: root ниже (при другом пути — замени везде).

server {
    listen 80;
    listen [::]:80;
    server_name pokemon-game.byred.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pokemon-game.byred.fun;

    ssl_certificate     /etc/letsencrypt/live/pokemon-game.byred.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pokemon-game.byred.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Повторные TLS-рукопожатия быстрее
    ssl_session_cache shared:SSL:16m;
    ssl_session_timeout 1d;

    root /root/schoolgame/builds/web;

    # Быстрая отдача файлов с диска
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    open_file_cache max=20000 inactive=30s;
    open_file_cache_valid 45s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Сжатие ответов (WASM/JS сильно жмутся)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml application/xml+rss image/svg+xml
        application/wasm application/octet-stream
        font/woff font/woff2 application/font-woff application/font-woff2;

    location = / {
        return 302 /school21_game.html;
    }

    location /check {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(auth|tasks|code-errors|users|swagger)(/|$) {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API не кэшируем у nginx (личные данные / JWT)
        add_header Cache-Control "no-store" always;
    }

    # Статика Godot: долгий кэш в браузере (после нового экспорта имена те же — сделай purge в Cloudflare или смени query в HTML при критичных обновлениях)
    location ~* \.(?:wasm|js|mjs|pck|data|bc|png|jpe?g|webp|gif|svgz?|ico|avif|ogg|mp3|opus|woff2?|ttf|eot|json|webmanifest)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
    }

    location / {
        try_files $uri $uri/ =404;
        # HTML и прочее без вечного immutable
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }
}
